name: 'Create Pull Request'
description: 'Creates or updates a pull request for changes to the repository'
inputs:
  token:
    description: 'GitHub token for authentication'
    required: true
  branch:
    description: 'The pull request branch name'
    required: true
  base:
    description: 'The base branch for the pull request'
    required: false
    default: 'main'
  title:
    description: 'The title of the pull request'
    required: true
  body:
    description: 'The body of the pull request'
    required: true
  labels:
    description: 'A newline-separated list of labels'
    required: false
    default: ''
  commit-message:
    description: 'The commit message to use when committing changes'
    required: false
    default: '[create-pull-request] automated change'
  branch-already-exists:
    description: 'Set to true if the branch is already pushed remotely (skips commit/push)'
    required: false
    default: 'false'
outputs:
  pull-request-number:
    description: 'The pull request number'
    value: ${{ steps.create-pr.outputs.pull-request-number }}
  pull-request-url:
    description: 'The URL of the pull request'
    value: ${{ steps.create-pr.outputs.pull-request-url }}
  pull-request-operation:
    description: 'The pull request operation performed (created, updated, none)'
    value: ${{ steps.create-pr.outputs.pull-request-operation }}
runs:
  using: 'composite'
  steps:
    - name: Configure git authentication
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        # actions/checkout persists GITHUB_TOKEN as an extraheader by default. If
        # that credential wins for git push, GitHub suppresses the PR synchronize
        # workflows. Remove it so pushes use the supplied token instead.
        git config --local --unset-all http.https://github.com/.extraheader || true
        gh auth setup-git

    - name: Commit and push changes
      if: inputs.branch-already-exists != 'true'
      id: commit-and-push
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        # Check for any changes (staged, unstaged, or untracked)
        if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
          echo "No changes to commit"
          echo "has_changes=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "has_changes=true" >> $GITHUB_OUTPUT

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # Create or reset branch
        git checkout -B "$BRANCH"
        git add -A
        git commit -m "$COMMIT_MESSAGE"
        git push -f origin "$BRANCH"

    - name: Create or update pull request
      id: create-pr
      if: inputs.branch-already-exists == 'true' || steps.commit-and-push.outputs.has_changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        BRANCH: ${{ inputs.branch }}
        BASE: ${{ inputs.base }}
        PR_TITLE: ${{ inputs.title }}
        PR_BODY: ${{ inputs.body }}
        LABELS: ${{ inputs.labels }}
      run: |
        # Check if a PR already exists for this branch
        EXISTING_PR=$(gh pr list --head "$BRANCH" --base "$BASE" --json number,url --jq '.[0] // empty')

        if [ -n "$EXISTING_PR" ]; then
          PR_NUMBER=$(echo "$EXISTING_PR" | jq -r '.number')
          PR_URL=$(echo "$EXISTING_PR" | jq -r '.url')
          echo "Pull request #$PR_NUMBER already exists: $PR_URL"
          echo "pull-request-number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pull-request-url=$PR_URL" >> $GITHUB_OUTPUT
          echo "pull-request-operation=none" >> $GITHUB_OUTPUT
        else
          # Build label arguments as a bash array (avoids eval/injection).
          # Filter out any labels that don't exist in the repo — `gh pr create`
          # otherwise fails the whole call with "could not add label: '<name>' not found",
          # which would silently break release/automation workflows whenever a
          # label is renamed or removed. We warn about each skipped label so
          # the maintainer can fix the workflow input on their own schedule.
          LABEL_ARGS=()
          if [ -n "$LABELS" ]; then
            # Fetch every label name in the repo. `gh label list` does not
            # support pagination, so use the REST API directly to avoid
            # misclassifying valid labels when the repository grows past one page.
            EXISTING_LABELS=$(gh api "repos/${GITHUB_REPOSITORY}/labels?per_page=100" --paginate --jq '.[].name' 2>/dev/null || echo '')
            while IFS= read -r label; do
              label=$(echo "$label" | xargs)  # trim whitespace
              if [ -z "$label" ]; then
                continue
              fi
              if echo "$EXISTING_LABELS" | grep -Fxq "$label"; then
                LABEL_ARGS+=(--label "$label")
              else
                echo "::warning::Skipping label '$label' — not found in this repository."
              fi
            done <<< "$LABELS"
          fi

          # Write body to a temp file to avoid shell quoting issues with special characters
          BODY_FILE=$(mktemp)
          trap 'rm -f "$BODY_FILE"' EXIT
          printf '%s\n' "$PR_BODY" > "$BODY_FILE"

          # Create the pull request without eval — all args are properly quoted
          PR_URL=$(gh pr create \
            --title "$PR_TITLE" \
            --body-file "$BODY_FILE" \
            --base "$BASE" \
            --head "$BRANCH" \
            "${LABEL_ARGS[@]}")

          rm -f "$BODY_FILE"
          trap - EXIT

          PR_NUMBER=$(gh pr view "$BRANCH" --json number --jq '.number')
          echo "Created pull request #$PR_NUMBER: $PR_URL"
          echo "pull-request-number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pull-request-url=$PR_URL" >> $GITHUB_OUTPUT
          echo "pull-request-operation=created" >> $GITHUB_OUTPUT
        fi
