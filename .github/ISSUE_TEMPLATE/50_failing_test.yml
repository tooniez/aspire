name: Failing test
description: Create a report about a failing test.
title: "[Failing test]: "
labels: [ "failing-test" ]
body:
  - type: markdown
    attributes:
      value: |
        Test(s) failing on a GitHub Actions CI run. This issue tracks the failure using the known-issues style format.
        Fill in the `Build information` block. `Fill in the error message template` should use either `ErrorMessage` or `ErrorPattern` so the issue stays actionable.
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search [aspire/issues](https://github.com/microsoft/aspire/issues) before filing a new failing-test issue.
      options:
        - label: I have searched the existing issues
          required: true
  - type: textarea
    attributes:
      label: Build information
      value: |
        Build: 
        Build error leg or test failing: 
    validations:
      required: true
  - type: textarea
    attributes:
      label: Fill in the error message template
      value: |
        <!-- Error message template  -->
        ## Error Message

        Fill the error message using [step by step known issues guidance](https://github.com/dotnet/arcade/blob/main/Documentation/Projects/Build%20Analysis/KnownIssueJsonStepByStep.md).

        <!-- Use ErrorMessage for String.Contains matches. Use ErrorPattern for regex matches (single line/no backtracking). Set BuildRetry to `true` to retry builds with this error. Set ExcludeConsoleLog to `true` to skip helix logs analysis. -->

        ```json
        {
          "ErrorMessage": "",
          "ErrorPattern": "",
          "BuildRetry": false,
          "ExcludeConsoleLog": false
        }
        ```
    validations:
      required: false
  - type: textarea
    attributes:
      label: Error details
      description: Include the failing error message and stack trace in the same style as existing failing-test issues.
      value: |
        ```yml
        Error Message:
        Stack Trace:
        ```
    validations:
      required: false
  - type: textarea
    attributes:
      label: Standard output
      description: Paste the relevant standard output inside the existing collapsible details block format.
      value: |
        <details>
        <summary>Standard Output</summary>

        ```yml
        ```

        </details>
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        <!-- failing-test-signature: v1:manual -->
