name: PR Documentation Check

on:
  # Use pull_request_target to run in the context of the base branch
  # This allows commenting on PRs from forks
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to analyze'
        required: true
        type: number

permissions:
  pull-requests: read
  contents: read
  issues: write

jobs:
  check-docs-needed:
    # Only run on the dotnet org to avoid running on forks
    if: (github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch') && github.repository_owner == 'microsoft'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'

      - name: Install GitHub Copilot CLI
        run: |
          npm install -g @github/copilot || {
            echo "Error: Failed to install GitHub Copilot CLI"
            exit 1
          }

      - name: Set PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Get PR details
        id: pr_details
        run: |
          if ! gh pr view ${{ steps.pr.outputs.number }} --json title,author --jq '{title: .title, author: .author.login}' > pr-info.json; then
            echo "Error: Failed to fetch PR #${{ steps.pr.outputs.number }}"
            exit 1
          fi

          TITLE=$(jq -r '.title' pr-info.json)
          AUTHOR=$(jq -r '.author' pr-info.json)

          if [ -z "$TITLE" ] || [ "$TITLE" == "null" ]; then
            echo "Error: Could not extract PR title"
            exit 1
          fi

          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get PR diff
        id: diff
        run: |
          if ! gh pr diff ${{ steps.pr.outputs.number }} > pr-diff.txt; then
            echo "Error: Failed to fetch diff for PR #${{ steps.pr.outputs.number }}"
            exit 1
          fi

          if [ ! -s pr-diff.txt ]; then
            echo "Warning: PR diff is empty, no changes to analyze"
            echo "NO_DOCS_NEEDED" > pr-diff.txt
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate documentation requirements with Copilot
        id: analyze
        run: |
          if [ ! -f .github/prompts/docs-audit-prompt.md ]; then
            echo "Error: Prompt file .github/prompts/docs-audit-prompt.md not found"
            exit 1
          fi

          cat .github/prompts/docs-audit-prompt.md > prompt.txt
          echo "" >> prompt.txt
          echo "PR #${PR_NUMBER}: ${PR_TITLE}" >> prompt.txt
          echo "" >> prompt.txt
          echo "PR Diff:" >> prompt.txt
          cat pr-diff.txt >> prompt.txt

          if ! copilot -p "$(cat prompt.txt)" > analysis.txt 2>copilot-error.log; then
            echo "Error: Copilot CLI failed"
            echo "Error details:"
            cat copilot-error.log
            exit 1
          fi

          if [ ! -s analysis.txt ]; then
            echo "Error: Copilot produced no output"
            exit 1
          fi

          cat analysis.txt
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.DOCS_COPILOT_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr_details.outputs.title }}

      - name: Check if docs needed
        id: docs_check
        run: |
          if grep -q "NO_DOCS_NEEDED" analysis.txt; then
            echo "docs_needed=false" >> $GITHUB_OUTPUT
          else
            echo "docs_needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Output documentation analysis results
        run: |
          if [ ! -f analysis.txt ]; then
            echo "Error: Analysis file not found"
            exit 1
          fi

          echo "============================================"
          echo "Documentation Analysis for PR #${PR_NUMBER}"
          echo "PR Title: ${PR_TITLE}"
          echo "PR Author: ${PR_AUTHOR}"
          echo "============================================"
          echo ""

          if [ "${DOCS_NEEDED}" == "false" ]; then
            echo "✅ No documentation updates required"
          else
            echo "📝 Documentation updates recommended:"
            echo ""
            cat analysis.txt
          fi

          echo ""
          echo "============================================"
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr_details.outputs.title }}
          PR_AUTHOR: ${{ steps.pr_details.outputs.author }}
          DOCS_NEEDED: ${{ steps.docs_check.outputs.docs_needed }}

      - name: Create issue on aspire.dev repo
        if: steps.docs_check.outputs.docs_needed == 'true'
        id: create_issue
        run: |
          {
            echo "## Documentation Update Required"
            echo ""
            echo "This issue was automatically created based on changes from microsoft/aspire PR #${PR_NUMBER}."
            echo ""
            echo "**PR Title:** ${PR_TITLE}"
            echo "**PR Author:** @${PR_AUTHOR}"
            echo "**PR Link:** https://github.com/${{ github.repository }}/pull/${PR_NUMBER}"
            echo ""
            echo "## Recommended Documentation Updates"
            echo ""
            cat analysis.txt
          } > issue-body.md

          ISSUE_URL=$(gh issue create \
            --repo microsoft/aspire.dev \
            --title "Docs update for microsoft/aspire#${PR_NUMBER}: ${PR_TITLE}" \
            --body-file issue-body.md \
            --label "docs-from-code")

          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr_details.outputs.title }}
          PR_AUTHOR: ${{ steps.pr_details.outputs.author }}

      - name: Comment on PR
        run: |
          if [ "${DOCS_NEEDED}" == "true" ]; then
            {
              echo "## 📝 Documentation Update Needed"
              echo ""
              echo "Hey @${PR_AUTHOR}! This PR requires documentation updates."
              echo ""
              echo "An issue has been created to track the documentation work: ${ISSUE_URL}"
              echo ""
              echo "<details>"
              echo "<summary>Recommended Updates</summary>"
              echo ""
              cat analysis.txt
              echo ""
              echo "</details>"
            } > comment-body.md
          else
            {
              echo "## ✅ No Documentation Updates Needed"
              echo ""
              echo "Hey @${PR_AUTHOR}! This PR does not require documentation updates."
              echo ""
              echo "For more details, check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
            } > comment-body.md
          fi

          gh pr comment "${PR_NUMBER}" --body-file comment-body.md
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_AUTHOR: ${{ steps.pr_details.outputs.author }}
          DOCS_NEEDED: ${{ steps.docs_check.outputs.docs_needed }}
          ISSUE_URL: ${{ steps.create_issue.outputs.issue_url }}
