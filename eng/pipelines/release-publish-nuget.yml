# Release Pipeline: Publish NuGet Packages and Promote to GA Channel
#
# This pipeline automates the release process for microsoft/aspire:
# 1. Downloads signed packages from a specified build
# 2. Publishes packages to NuGet.org
# 3. Promotes the build to the Aspire GA channel via darc
# 4. Submits WinGet manifests and Homebrew cask PRs
# 5. Dispatches the release-github-tasks GitHub Actions workflow as the
#    aspire-repo-bot GitHub App (tag, GitHub Release, merge-back PR,
#    baseline PR) and waits for it to complete
# 6. Uploads aspire-cli-* archives from the source build's BlobArtifacts
#    onto the GitHub Release as the aspire-repo-bot
#
# For full documentation, see: docs/release-process.md

trigger: none  # Manual trigger only
pr: none       # Not triggered by PRs

parameters:
  # ===== COMMON PARAMETERS =====
  # The two most common knobs for a release run. Most other parameters below
  # are flagged [Advanced] and should be left at their defaults unless you
  # are deliberately re-running after a partial failure.

  - name: ReleaseVersion
    displayName: 'Release Version (leave as "auto" to derive from source build tag, or set explicitly e.g. 13.3.4)'
    type: string
    default: 'auto'

  - name: IsPrerelease
    displayName: 'Is this a preview / prerelease?'
    type: boolean
    default: false

  - name: DryRun
    displayName: 'Dry Run (skip actual publish - for testing)'
    type: boolean
    default: false

  - name: GaChannelName
    displayName: '[Advanced] GA Channel Name (darc promotion target; do NOT change even for Aspire 10.x+ — the channel is named "Aspire 9.x GA" historically)'
    type: string
    default: 'Aspire 9.x GA'

  # ===== ADVANCED PARAMETERS =====
  # Below this point: leave defaults unless you know exactly what you are
  # changing. The Skip* booleans are for re-running after a partial failure;
  # GitHubTasksWorkflowRef is for testing pipeline changes on a topic branch.

  - name: SkipNuGetPublish
    displayName: '[Advanced] Skip NuGet Publishing (re-run after success)'
    type: boolean
    default: false

  - name: SkipChannelPromotion
    displayName: '[Advanced] Skip Channel Promotion (re-run after success)'
    type: boolean
    default: false

  - name: SkipWinGetPublish
    displayName: '[Advanced] Skip WinGet Publishing (re-run after success)'
    type: boolean
    default: true

  - name: SkipHomebrewPublish
    displayName: '[Advanced] Skip Homebrew Publishing (re-run after success)'
    type: boolean
    default: true

  - name: SkipGitHubTasks
    displayName: '[Advanced] Skip GitHub Tasks dispatch (re-run after success)'
    type: boolean
    default: false

  - name: SkipReleaseAssets
    displayName: '[Advanced] Skip CLI asset upload to GitHub Release (re-run after success)'
    type: boolean
    default: false

  # Ref used when invoking `workflow_dispatch` against release-github-tasks.yml.
  # GitHub loads the workflow file *from this ref*, so it controls which version
  # of the workflow runs. The branch/commit being released is passed separately
  # via the `release_branch` and `commit_sha` workflow inputs, so this ref only
  # affects the workflow source — not what gets tagged or released. Defaults to
  # 'main' so workflow fixes don't require backporting to every release branch.
  - name: GitHubTasksWorkflowRef
    displayName: '[Advanced] Ref to dispatch release-github-tasks.yml from (workflow source only)'
    type: string
    default: 'main'

variables:
  - template: /eng/pipelines/common-variables.yml@self
  - template: /eng/common/templates-official/variables/pool-providers.yml@self
  # Variable group containing secrets (VscePublishToken for future use)
  # Note: NuGet publishing uses service connection 'NuGet.org - dotnet/aspire' instead of API key
  - group: Aspire-Release-Secrets
  # Variable group containing aspire-winget-bot-pat and aspire-homebrew-bot-pat for WinGet and Homebrew publishing
  - group: Aspire-Secrets

resources:
  repositories:
    - repository: 1ESPipelineTemplates
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release
  pipelines:
    - pipeline: aspire-build
      source: microsoft-aspire  # Name of the main build pipeline
      project: internal      # AzDO project name
      trigger: none          # Manual trigger only - no automatic releases

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: NetCore1ESPool-Internal
      image: windows.vs2026preview.scout.amd64
      os: windows
    # Network isolation policy for ES4.2.4 CFS compliance.
    # CFSClean is intentionally omitted here because it blocks all NuGet endpoints
    # (api.nuget.org, www.nuget.org, etc.) via DNS sinkhole and this release pipeline
    # must push packages to NuGet.org via the 1ES.PublishNuget@1 task. ES4.2.4 requires
    # pipelines to *consume* packages from internal feeds (which we do — NuGet.config
    # only uses pkgs.dev.azure.com/dnceng feeds), but does not prohibit *publishing* to
    # public registries. CFSClean2 is retained to block Docker, PowerShell Gallery, and
    # other endpoints not needed by this pipeline.
    # See: https://eng.ms/docs/microsoft-ai/webxt/feed-verticals/start-experiences/fv-live-site/sfi-executor-centric-wiki/skills/security/mdp-cfs-security-change/skill
    settings:
      networkIsolationPolicy: Permissive,CFSClean2

    stages:
      # ===== STAGE 1: PREPARE ARTIFACTS =====
      # This buildJob downloads artifacts from the source build and re-publishes them.
      # 1ES PT will inject SBOM generation tasks, making the artifacts compliant for releaseJob.
      - stage: PrepareArtifacts
        displayName: 'Prepare Artifacts with SBOM'
        jobs:
          - job: PrepareJob
            displayName: 'Download and Re-publish Artifacts'
            timeoutInMinutes: 30
            pool:
              name: NetCore1ESPool-Internal
              image: windows.vs2026preview.scout.amd64
              os: windows
            variables:
              SourceBuildId: $(resources.pipeline.aspire-build.runID)
            templateContext:
              outputs:
                - output: pipelineArtifact
                  displayName: 'Publish PackageArtifacts with SBOM'
                  targetPath: '$(Pipeline.Workspace)/packages/PackageArtifacts'
                  artifactName: 'PackageArtifacts'
                - ${{ if eq(parameters.SkipWinGetPublish, false) }}:
                  - output: pipelineArtifact
                    displayName: 'Publish WinGet Manifests'
                    targetPath: '$(Pipeline.Workspace)/installers/winget-manifests-stable'
                    artifactName: 'winget-manifests-stable'
                - ${{ if eq(parameters.SkipHomebrewPublish, false) }}:
                  - output: pipelineArtifact
                    displayName: 'Publish Homebrew Cask'
                    targetPath: '$(Pipeline.Workspace)/installers/homebrew-cask-stable'
                    artifactName: 'homebrew-cask-stable'
            steps:
              - checkout: none

              - powershell: |
                  Write-Host "=== Prepare Artifacts Stage ==="
                  Write-Host "Source Build ID: $(resources.pipeline.aspire-build.runID)"
                  Write-Host "Source Build Name: $(resources.pipeline.aspire-build.runName)"
                  Write-Host "This stage downloads artifacts and re-publishes them so 1ES PT can generate SBOM."
                  Write-Host "Installer-only mode: ${{ and(eq(parameters.SkipNuGetPublish, true), eq(parameters.SkipChannelPromotion, true)) }}"
                  Write-Host "==============================="
                displayName: 'Log Stage Info'

              # Auto-derive ReleaseVersion from the source build's `release-version - *`
              # tag (set by eng/pipelines/azure-pipelines.yml after the version is
              # computed from the Aspire.Hosting.AppHost nupkg). This means operators
              # don't have to retype the version when queuing a release — the tag
              # is also visible in the AzDO source-build picker so it can be verified
              # at queue time.
              #
              # Override semantics: if the operator passes a non-empty
              # parameters.ReleaseVersion, we honor it but log a loud warning when
              # it disagrees with the build tag. The override is the documented
              # escape hatch for re-shipping under a corrected tag.
              #
              # Failure semantics: hard-fail when no override is supplied AND the
              # source build has no `release-version - *` tag (e.g., a pre-tagging
              # build was selected). The fix is either to backport the tag-add
              # change to the relevant release branch and re-run the source build,
              # or pass an explicit -ReleaseVersion override.
              - powershell: |
                  $buildId = "$(resources.pipeline.aspire-build.runID)"
                  $org     = "$(System.CollectionUri)"
                  $project = "internal"
                  $override = "${{ parameters.ReleaseVersion }}"

                  # Sentinel: AzDO's UI rejects empty-string param values even
                  # when default is '', so we use the literal 'auto' as a
                  # stand-in for "derive from source build tag". Match
                  # case-insensitively with whitespace trimming so operators
                  # who paste " Auto " still hit the sentinel branch.
                  if ($override.Trim() -match '^(?i)auto$') {
                    $override = ''
                  }

                  $uri = "${org}${project}/_apis/build/builds/${buildId}/tags?api-version=7.0"
                  Write-Host "Fetching tags for source build $buildId from $uri"

                  try {
                    $response = Invoke-RestMethod -Uri $uri -Headers @{
                      Authorization = "Bearer $(System.AccessToken)"
                    } -Method Get
                  } catch {
                    Write-Error "Failed to fetch tags from source build $buildId : $_"
                    exit 1
                  }

                  Write-Host "Build tags: $($response.value -join ', ')"

                  # Tags look like 'release-version - 13.3.3'. Filter and parse.
                  # The ' - ' separator (rather than ':') matches the 'BAR ID - <id>'
                  # tag style and avoids AzDO's 1ES PT request validator rejecting ':'
                  # in tag names (it becomes part of the addbuildtag REST URL path).
                  # NB: variable named $tagMatches (not $matches) to avoid shadowing
                  # PowerShell's automatic $Matches hashtable.
                  $tagMatches = @($response.value | Where-Object { $_ -match '^release-version - (.+)$' })

                  $derived = $null
                  if ($tagMatches.Count -eq 0) {
                    if ([string]::IsNullOrWhiteSpace($override)) {
                      $msg = "Source build $buildId has no 'release-version - *' tag and no -ReleaseVersion was supplied. " +
                             "Either re-queue with an explicit -ReleaseVersion <X.Y.Z> override, or run a newer source " +
                             "build that includes the tag-emitting step from eng/pipelines/azure-pipelines.yml."
                      Write-Error $msg
                      exit 1
                    }
                    Write-Host "##vso[task.logissue type=warning]No 'release-version - *' tag on source build $buildId; using operator-supplied -ReleaseVersion '$override'."
                  } elseif ($tagMatches.Count -gt 1) {
                    Write-Error "Source build $buildId has multiple 'release-version - *' tags ($($tagMatches -join ', ')). Refusing to guess; pass -ReleaseVersion explicitly."
                    exit 1
                  } else {
                    $derived = ($tagMatches[0] -replace '^release-version - ', '').Trim()
                    if ($derived -notmatch '^\d+\.\d+\.\d+(-[A-Za-z0-9.-]+)?$') {
                      Write-Error "Derived release version '$derived' does not look like valid semver (X.Y.Z[-suffix])."
                      exit 1
                    }
                    Write-Host "Derived release version from tag: $derived"
                  }

                  # Resolve the effective value: operator override wins, derived is fallback.
                  if (-not [string]::IsNullOrWhiteSpace($override)) {
                    if ($derived -and $override -ne $derived) {
                      Write-Host "##vso[task.logissue type=warning]Operator-supplied -ReleaseVersion '$override' does NOT match source-build tag 'release-version - $derived'. Proceeding with operator override."
                    }
                    $effective = $override.Trim()
                  } else {
                    $effective = $derived
                  }

                  Write-Host "✓ ReleaseVersionEffective: $effective"
                  Write-Host "##vso[task.setvariable variable=releaseVersionEffective;isOutput=true]$effective"
                name: deriveReleaseVersion
                displayName: 'Derive ReleaseVersion from source build tag'
                env:
                  SYSTEM_ACCESSTOKEN: $(System.AccessToken)

              # Download artifacts from the source build pipeline
              - ${{ if not(and(eq(parameters.SkipNuGetPublish, true), eq(parameters.SkipChannelPromotion, true))) }}:
                - download: aspire-build
                  displayName: 'Download PackageArtifacts from Source Build'
                  artifact: PackageArtifacts
                  patterns: '**/*.nupkg'

              - ${{ if eq(parameters.SkipWinGetPublish, false) }}:
                - download: aspire-build
                  displayName: 'Download WinGet Manifests from Source Build'
                  artifact: winget-manifests-stable

              - ${{ if eq(parameters.SkipHomebrewPublish, false) }}:
                - download: aspire-build
                  displayName: 'Download Homebrew Cask from Source Build'
                  artifact: homebrew-cask-stable

              # Move artifacts to expected location for output
              - ${{ if not(and(eq(parameters.SkipNuGetPublish, true), eq(parameters.SkipChannelPromotion, true))) }}:
                - powershell: |
                    $sourcePath = "$(Pipeline.Workspace)/aspire-build/PackageArtifacts"
                    $targetPath = "$(Pipeline.Workspace)/packages/PackageArtifacts"

                    Write-Host "Moving artifacts from $sourcePath to $targetPath"

                    if (!(Test-Path $targetPath)) {
                      New-Item -ItemType Directory -Path $targetPath -Force | Out-Null
                    }

                    # Copy all nupkg files
                    $packages = Get-ChildItem -Path $sourcePath -Filter "*.nupkg" -Recurse
                    Write-Host "Found $($packages.Count) packages to copy"

                    foreach ($pkg in $packages) {
                      Copy-Item $pkg.FullName -Destination $targetPath -Force
                      Write-Host "  Copied: $($pkg.Name)"
                    }

                    Write-Host "✓ Artifacts prepared for SBOM generation"
                  displayName: 'Prepare Artifacts for Publishing'

              - ${{ if and(eq(parameters.SkipNuGetPublish, true), eq(parameters.SkipChannelPromotion, true)) }}:
                - powershell: |
                    $targetPath = "$(Pipeline.Workspace)/packages/PackageArtifacts"

                    if (!(Test-Path $targetPath)) {
                      New-Item -ItemType Directory -Path $targetPath -Force | Out-Null
                    }

                    Write-Host "Installer-only run detected; created empty PackageArtifacts placeholder."
                  displayName: 'Prepare Empty PackageArtifacts Placeholder'

              # Copy installer artifacts to expected locations for output.
              # Entries whose source directory doesn't exist are silently skipped, which
              # handles re-runs where SkipWinGetPublish/SkipHomebrewPublish caused the
              # corresponding download step to be omitted.
              - powershell: |
                  $artifacts = @(
                    @{ Name = 'winget-manifests-stable'; Source = '$(Pipeline.Workspace)/aspire-build/winget-manifests-stable'; Target = '$(Pipeline.Workspace)/installers/winget-manifests-stable' },
                    @{ Name = 'homebrew-cask-stable'; Source = '$(Pipeline.Workspace)/aspire-build/homebrew-cask-stable'; Target = '$(Pipeline.Workspace)/installers/homebrew-cask-stable' }
                  )

                  foreach ($artifact in $artifacts) {
                    if (!(Test-Path $artifact.Source)) {
                      Write-Host "Skipping $($artifact.Name): source path '$($artifact.Source)' not present (download was skipped)."
                      continue
                    }

                    Write-Host "Copying $($artifact.Name) from $($artifact.Source) to $($artifact.Target)"

                    if (!(Test-Path $artifact.Target)) {
                      New-Item -ItemType Directory -Path $artifact.Target -Force | Out-Null
                    }

                    $files = Get-ChildItem -Path $artifact.Source -Recurse -File
                    Write-Host "  Found $($files.Count) files"
                    foreach ($file in $files) {
                      $relativePath = $file.FullName.Substring($artifact.Source.Length + 1)
                      $destPath = Join-Path $artifact.Target $relativePath
                      $destDir = Split-Path $destPath -Parent
                      if (!(Test-Path $destDir)) {
                        New-Item -ItemType Directory -Path $destDir -Force | Out-Null
                      }
                      Copy-Item $file.FullName -Destination $destPath -Force
                      Write-Host "    Copied: $relativePath"
                    }
                  }

                  Write-Host "✓ Installer artifacts prepared"
                displayName: 'Prepare Installer Artifacts'

      # ===== STAGE 2: RELEASE =====
      # This releaseJob consumes the artifacts with SBOM and publishes to NuGet.org
      - stage: Release
        displayName: 'Release to NuGet and Promote'
        dependsOn: PrepareArtifacts
        jobs:
          - job: ReleaseJob
            displayName: 'Validate, Publish, and Promote'
            timeoutInMinutes: 120
            pool:
              name: NetCore1ESPool-Internal
              image: windows.vs2026preview.scout.amd64
              os: windows
            variables:
              BarBuildId: ''
            # templateContext type: releaseJob enables proper network access for external publishing
            # inputs.pipelineArtifact consumes artifacts from PrepareArtifacts stage (which have SBOM)
            templateContext:
              type: releaseJob
              isProduction: true
              inputs:
                - input: pipelineArtifact
                  artifactName: PackageArtifacts
                  targetPath: '$(Pipeline.Workspace)/packages/PackageArtifacts'
            steps:
              # ===== VALIDATION =====
              # Note: No checkout - releaseJob doesn't allow it. All scripts are inlined.
              # Artifacts are downloaded via templateContext inputs above.

              - powershell: |
                  Write-Host "=== Release Pipeline Parameters ==="
                  Write-Host "Source Build Pipeline: aspire-build"
                  Write-Host "Source Build ID: $(resources.pipeline.aspire-build.runID)"
                  Write-Host "Source Build Name: $(resources.pipeline.aspire-build.runName)"
                  Write-Host "Source Build URI: $(resources.pipeline.aspire-build.runURI)"
                  Write-Host "GA Channel: ${{ parameters.GaChannelName }}"
                  Write-Host "Dry Run: ${{ parameters.DryRun }}"
                  Write-Host "Skip NuGet Publish: ${{ parameters.SkipNuGetPublish }}"
                  Write-Host "Skip Channel Promotion: ${{ parameters.SkipChannelPromotion }}"
                  Write-Host "Installer-only mode: ${{ and(eq(parameters.SkipNuGetPublish, true), eq(parameters.SkipChannelPromotion, true)) }}"
                  Write-Host "==================================="
                displayName: 'Validate Parameters'

              # ===== EXTRACT BAR BUILD ID =====
              - ${{ if eq(parameters.SkipChannelPromotion, false) }}:
                - powershell: |
                    $buildId = "$(resources.pipeline.aspire-build.runID)"
                    $org = "$(System.CollectionUri)"
                    $project = "internal"

                    Write-Host "Fetching build tags for build: $buildId"

                    # Use Azure DevOps REST API to get build tags
                    $uri = "${org}${project}/_apis/build/builds/${buildId}/tags?api-version=7.0"
                    Write-Host "API URI: $uri"

                    try {
                      $response = Invoke-RestMethod -Uri $uri -Headers @{
                        Authorization = "Bearer $(System.AccessToken)"
                      } -Method Get

                      Write-Host "Build tags found: $($response.value -join ', ')"

                      # Find the BAR ID tag
                      $barIdTag = $response.value | Where-Object { $_ -match 'BAR ID - (\d+)' }

                      if ($barIdTag -and $barIdTag -match 'BAR ID - (\d+)') {
                        $barBuildId = $Matches[1]
                        Write-Host "✓ Extracted BAR Build ID: $barBuildId"
                        Write-Host "##vso[task.setvariable variable=BarBuildId]$barBuildId"
                      } else {
                        Write-Error "Could not find BAR ID tag in build $buildId. Tags found: $($response.value -join ', ')"
                        exit 1
                      }
                    } catch {
                      Write-Error "Failed to fetch build tags: $_"
                      exit 1
                    }
                  displayName: 'Extract BAR Build ID'
                  env:
                    SYSTEM_ACCESSTOKEN: $(System.AccessToken)

              # ===== DOWNLOAD PACKAGES =====
              # Artifacts are downloaded automatically via templateContext.inputs above

              - ${{ if eq(parameters.SkipNuGetPublish, false) }}:
                - task: UseDotNet@2
                  displayName: 'Install .NET 10 SDK'
                  inputs:
                    packageType: 'sdk'
                    version: '10.0.x'

                - powershell: |
                    $packagesPath = "$(Pipeline.Workspace)/packages/PackageArtifacts"
                    Write-Host "=== Package Inventory ==="

                    $packages = Get-ChildItem -Path $packagesPath -Filter "*.nupkg" -Recurse
                    Write-Host "Found $($packages.Count) packages:"

                    foreach ($pkg in $packages) {
                      $sizeMB = [math]::Round($pkg.Length / 1MB, 2)
                      Write-Host "  - $($pkg.Name) ($sizeMB MB)"
                    }

                    if ($packages.Count -eq 0) {
                      Write-Error "No packages found in artifacts!"
                      exit 1
                    }

                    Write-Host "==========================="
                  displayName: 'List Packages'

                # ===== VERIFY SIGNATURES =====
                # Verify packages in parallel via ForEach-Object -Parallel.
                # Sequential verification was the single biggest time sink in
                # this stage (~1.5s per package * ~80 packages). Throttle to
                # 8 to avoid saturating the runner's CPU / network for the
                # cert-revocation checks `dotnet nuget verify` performs. The
                # runner ships PowerShell 7+, so -Parallel is available.
                - pwsh: |
                    $packagesPath = "$(Pipeline.Workspace)/packages/PackageArtifacts"
                    Write-Host "=== Verifying Package Signatures (parallel) ==="

                    $packages = Get-ChildItem -Path $packagesPath -Filter "*.nupkg" -Recurse
                    Write-Host "Found $($packages.Count) packages to verify"

                    # ConcurrentBag is thread-safe; we collect failed package
                    # names across runspaces without locking.
                    $failedVerification = [System.Collections.Concurrent.ConcurrentBag[string]]::new()

                    $packages | ForEach-Object -ThrottleLimit 8 -Parallel {
                      $package = $_
                      $bag = $using:failedVerification

                      # Prevent PowerShell from treating stderr writes from
                      # the verify command as terminating errors inside the
                      # parallel runspace.
                      $ErrorActionPreference = 'Continue'
                      $result = dotnet nuget verify $package.FullName 2>&1
                      $verifyExitCode = $LASTEXITCODE

                      if ($verifyExitCode -ne 0) {
                        Write-Host "  ❌ $($package.Name): signature verification FAILED"
                        Write-Host $result
                        $bag.Add($package.Name)
                      } else {
                        Write-Host "  ✓ $($package.Name)"
                      }
                    }

                    if ($failedVerification.Count -gt 0) {
                      Write-Host ""
                      Write-Host "=== SIGNATURE VERIFICATION FAILED ==="
                      Write-Host "The following packages failed signature verification:"
                      foreach ($pkg in $failedVerification) {
                        Write-Host "  - $pkg"
                      }
                      Write-Error "Package signature verification failed. Aborting release."
                      exit 1
                    }

                    Write-Host ""
                    Write-Host "✓ All $($packages.Count) packages passed signature verification"
                    Write-Host "==========================="
                  displayName: 'Verify Package Signatures'

              # ===== PUBLISH TO NUGET =====
              # Dry Run: List packages that would be published (skip actual publish)
              - ${{ if and(eq(parameters.DryRun, true), eq(parameters.SkipNuGetPublish, false)) }}:
                - powershell: |
                    $packagesPath = "$(Pipeline.Workspace)/packages/PackageArtifacts"
                    Write-Host "=== DRY RUN MODE ==="
                    Write-Host "⚠️ The following packages would be published to NuGet.org:"
                    Write-Host ""
                    $packages = Get-ChildItem -Path $packagesPath -Filter "*.nupkg" -Recurse
                    foreach ($pkg in $packages) {
                      $sizeMB = [math]::Round($pkg.Length / 1MB, 2)
                      Write-Host "  - $($pkg.Name) ($sizeMB MB)"
                    }
                    Write-Host ""
                    Write-Host "Total: $($packages.Count) packages"
                    Write-Host "=== DRY RUN - No packages were actually published ==="
                  displayName: 'Dry Run - List Packages (No Publish)'

              # Actual Publish: Use 1ES.PublishNuget task (only when not dry run and not skipped)
              # Pattern from dotnet-diagnostics-internal-components and dotnet-macios:
              # - useDotNetTask: false (required - DotNetCoreCLI@2 doesn't support encrypted API keys)
              # - nuGetFeedType: external + publishFeedCredentials for NuGet.org
              - ${{ if and(eq(parameters.DryRun, false), eq(parameters.SkipNuGetPublish, false)) }}:
                - task: 1ES.PublishNuget@1
                  displayName: 'Push Packages to NuGet.org'
                  inputs:
                    useDotNetTask: false
                    packagesToPush: '$(Pipeline.Workspace)/packages/PackageArtifacts/*.nupkg'
                    packageParentPath: '$(Pipeline.Workspace)/packages/PackageArtifacts'
                    nuGetFeedType: external
                    publishFeedCredentials: 'NuGet.org - dotnet/aspire'

              # Skip message when SkipNuGetPublish is true
              - ${{ if eq(parameters.SkipNuGetPublish, true) }}:
                - powershell: |
                    Write-Host "=== Skipping NuGet Publishing (SkipNuGetPublish=true) ==="
                  displayName: 'Skip NuGet Publish (flagged)'

              # ===== PROMOTE TO CHANNEL =====
              - ${{ if eq(parameters.SkipChannelPromotion, false) }}:
                - powershell: |
                    Write-Host "Installing darc CLI..."
                    
                    # Query Maestro API for the correct darc version
                    $versionEndpoint = 'https://maestro.dot.net/api/assets/darc-version?api-version=2020-02-20'
                    $darcVersion = (Invoke-WebRequest -Uri $versionEndpoint -UseBasicParsing).Content
                    Write-Host "Darc version: $darcVersion"
                    
                    # Install darc as a .NET global tool
                    $arcadeServicesSource = 'https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-eng/nuget/v3/index.json'
                    Write-Host "Installing darc from $arcadeServicesSource..."
                    
                    dotnet tool install microsoft.dotnet.darc --version $darcVersion --add-source "$arcadeServicesSource" -g
                    
                    if ($LASTEXITCODE -ne 0) {
                      Write-Error "Failed to install darc CLI"
                      exit 1
                    }
                    
                    Write-Host "✓ Darc CLI installed successfully"
                  displayName: 'Install darc'

                - task: AzureCLI@2
                  displayName: 'Promote Build to Channel'
                  inputs:
                    azureSubscription: 'Darc: Maestro Production'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      $barBuildId = "$(BarBuildId)"
                      $channelName = "${{ parameters.GaChannelName }}"
                      $dryRun = [System.Convert]::ToBoolean("${{ parameters.DryRun }}")
                      $azdoToken = $env:SYSTEM_ACCESSTOKEN

                      Write-Host "=== Channel Promotion ==="
                      Write-Host "BAR Build ID: $barBuildId"
                      Write-Host "Target Channel: $channelName"

                      if ($dryRun) {
                        Write-Host "⚠️ DRY RUN MODE - Build will not actually be promoted"
                        Write-Host "[DRY RUN] Would run: darc add-build-to-channel --id $barBuildId --channel '$channelName' --azdev-pat <token> --ci"
                        exit 0
                      }

                      Write-Host "Promoting build $barBuildId to channel '$channelName'..."

                      # darc is installed as a global tool, so it's available in PATH
                      # --azdev-pat is required for darc to access Azure DevOps build artifacts
                      darc add-build-to-channel `
                        --id $barBuildId `
                        --channel "$channelName" `
                        --azdev-pat "$azdoToken" `
                        --ci

                      if ($LASTEXITCODE -ne 0) {
                        Write-Error "Failed to promote build to channel"
                        exit 1
                      }

                      Write-Host "✓ Build successfully promoted to '$channelName'"
                      Write-Host "==========================="
                  env:
                    SYSTEM_ACCESSTOKEN: $(System.AccessToken)

              # ===== SUMMARY =====
              - powershell: |
                  Write-Host ""
                  Write-Host "╔═══════════════════════════════════════════════════════════════╗"
                  Write-Host "║                    RELEASE SUMMARY                            ║"
                  Write-Host "╠═══════════════════════════════════════════════════════════════╣"
                  Write-Host "║ Source Build:   $(resources.pipeline.aspire-build.runName)"
                  Write-Host "║ Source Build ID: $(resources.pipeline.aspire-build.runID)"
                  if ("${{ parameters.SkipChannelPromotion }}" -eq "true") {
                    Write-Host "║ BAR Build ID:   (SKIPPED)"
                  } else {
                    Write-Host "║ BAR Build ID:   $(BarBuildId)"
                  }
                  Write-Host "║ GA Channel:     ${{ parameters.GaChannelName }}"
                  Write-Host "║ Dry Run:        ${{ parameters.DryRun }}"
                  Write-Host "╠═══════════════════════════════════════════════════════════════╣"
                  Write-Host "║ NuGet Publish:  ${{ parameters.SkipNuGetPublish }}" -NoNewline
                  if ("${{ parameters.SkipNuGetPublish }}" -eq "true") {
                    Write-Host " (SKIPPED)"
                  } else {
                    Write-Host " (EXECUTED)"
                  }
                  Write-Host "║ Channel Promo:  ${{ parameters.SkipChannelPromotion }}" -NoNewline
                  if ("${{ parameters.SkipChannelPromotion }}" -eq "true") {
                    Write-Host " (SKIPPED)"
                  } else {
                    Write-Host " (EXECUTED)"
                  }
                  Write-Host "║ WinGet:         (runs in parallel after this job)"
                  Write-Host "║ Homebrew:       (runs in parallel after this job)"
                  Write-Host "║ GitHub Tasks:   ${{ parameters.SkipGitHubTasks }}" -NoNewline
                  if ("${{ parameters.SkipGitHubTasks }}" -eq "true") {
                    Write-Host " (SKIPPED)"
                  } elseif ("${{ parameters.DryRun }}" -eq "true") {
                    Write-Host " (dispatched after Release stage; dry_run=true forwarded)"
                  } else {
                    Write-Host " (dispatched after Release stage)"
                  }
                  Write-Host "║ Release Assets: ${{ parameters.SkipReleaseAssets }}" -NoNewline
                  if ("${{ parameters.SkipReleaseAssets }}" -eq "true") {
                    Write-Host " (SKIPPED)"
                  } elseif ("${{ parameters.DryRun }}" -eq "true") {
                    Write-Host " (verify only; no upload in dry-run)"
                  } else {
                    Write-Host " (uploaded after GitHub Tasks job)"
                  }
                  Write-Host "╚═══════════════════════════════════════════════════════════════╝"
                  Write-Host ""
                displayName: 'Print Summary'
                condition: always()

          # ===== WINGET PUBLISHING =====
          - job: WinGetJob
            displayName: 'Submit WinGet Release Manifests'
            dependsOn: ReleaseJob
            condition: |
              and(
                in(dependencies.ReleaseJob.result, 'Succeeded', 'SucceededWithIssues'),
                eq('${{ parameters.SkipWinGetPublish }}', 'false')
              )
            timeoutInMinutes: 30
            pool:
              name: NetCore1ESPool-Internal
              image: windows.vs2026preview.scout.amd64
              os: windows
            templateContext:
              type: releaseJob
              isProduction: true
              inputs:
                - input: pipelineArtifact
                  artifactName: winget-manifests-stable
                  targetPath: '$(Pipeline.Workspace)/winget/winget-manifests-stable'
            steps:
              - template: /eng/pipelines/templates/publish-winget.yml@self
                parameters:
                  manifestArtifactPath: $(Pipeline.Workspace)/winget/winget-manifests-stable
                  packageIdentifier: Microsoft.Aspire
                  dryRun: ${{ parameters.DryRun }}

          # ===== HOMEBREW PUBLISHING =====
          - job: HomebrewJob
            displayName: 'Submit Homebrew Release Cask'
            dependsOn: ReleaseJob
            condition: |
              and(
                in(dependencies.ReleaseJob.result, 'Succeeded', 'SucceededWithIssues'),
                eq('${{ parameters.SkipHomebrewPublish }}', 'false')
              )
            timeoutInMinutes: 30
            pool:
              name: NetCore1ESPool-Internal
              image: windows.vs2026preview.scout.amd64
              os: windows
            templateContext:
              type: releaseJob
              isProduction: true
              inputs:
                - input: pipelineArtifact
                  artifactName: homebrew-cask-stable
                  targetPath: '$(Pipeline.Workspace)/homebrew/homebrew-cask-stable'
            steps:
              - template: /eng/pipelines/templates/publish-homebrew.yml@self
                parameters:
                  caskArtifactPath: $(Pipeline.Workspace)/homebrew/homebrew-cask-stable
                  dryRun: ${{ parameters.DryRun }}

      # ===== STAGE 3: GITHUB TASKS =====
      # Two responsibilities, both running as the aspire-repo-bot GitHub App:
      #
      #   1. DispatchGitHubTasksJob — dispatches the release-github-tasks
      #      GitHub Actions workflow (tag, GitHub Release, merge-back PR,
      #      baseline PR) and polls the run to completion. Fails the pipeline
      #      if the workflow doesn't succeed.
      #
      #   2. PublishReleaseAssetsJob — downloads aspire-cli-* archives from
      #      the signed source build's BlobArtifacts, verifies their SHA512s,
      #      and uploads them as assets on the GitHub release that the
      #      dispatch job just created.
      #
      # Each job has its own skip flag (SkipGitHubTasks / SkipReleaseAssets)
      # so partial-failure re-runs can recover either piece independently:
      #
      #   | SkipGitHubTasks | SkipReleaseAssets | Behavior                        |
      #   |-----------------|-------------------|---------------------------------|
      #   | false           | false             | Full path (default release)     |
      #   | true            | false             | Skip dispatch, upload assets    |
      #   | true            | true              | Skip the whole stage            |
      #   | false           | true              | Dispatch only, no asset upload  |
      #
      # DryRun behavior: this stage still runs when DryRun=true. DryRun is
      # propagated to the GH workflow as dry_run=true (keeps it from
      # creating tags/releases/PRs) and to the asset script (downloads and
      # verifies SHA512s but skips the gh release upload). This lets a
      # release manager validate the full AzDO → GitHub path end-to-end
      # without performing a real release.
      - stage: GitHubTasks
        displayName: 'Dispatch GitHub Release Tasks'
        dependsOn: Release
        condition: |
          and(
            in(dependencies.Release.result, 'Succeeded', 'SucceededWithIssues'),
            or(
              eq('${{ parameters.SkipGitHubTasks }}', 'false'),
              eq('${{ parameters.SkipReleaseAssets }}', 'false')
            )
          )
        jobs:
          - job: DispatchGitHubTasksJob
            displayName: 'Dispatch and Wait for release-github-tasks workflow'
            condition: eq('${{ parameters.SkipGitHubTasks }}', 'false')
            timeoutInMinutes: 90
            pool:
              name: NetCore1ESPool-Internal
              image: windows.vs2026preview.scout.amd64
              os: windows
            variables:
              # Pulled from the deriveReleaseVersion step in PrepareJob (PrepareArtifacts stage).
              ReleaseVersionEffective: $[ stageDependencies.PrepareArtifacts.PrepareJob.outputs['deriveReleaseVersion.releaseVersionEffective'] ]
            steps:
              - checkout: self
                displayName: 'Checkout repo (for dispatch script)'
                fetchDepth: 1

              - powershell: |
                  # Derive the GitHub workflow inputs from the source build resource.
                  # sourceBranch is in refs/heads/<name> form; strip the prefix.
                  $sourceBranch = "$(resources.pipeline.aspire-build.sourceBranch)"
                  $releaseBranch = $sourceBranch -replace '^refs/heads/', ''
                  $commitSha = "$(resources.pipeline.aspire-build.sourceCommit)"

                  Write-Host "Source branch: $sourceBranch -> release_branch: $releaseBranch"
                  Write-Host "Source commit: $commitSha"

                  if ([string]::IsNullOrWhiteSpace($commitSha) -or $commitSha.Length -ne 40) {
                    Write-Error "Expected a 40-char commit SHA from the source build, got '$commitSha'"
                    exit 1
                  }

                  Write-Host "##vso[task.setvariable variable=ReleaseBranchDerived]$releaseBranch"
                  Write-Host "##vso[task.setvariable variable=CommitShaDerived]$commitSha"
                displayName: 'Derive workflow inputs from source build'

              # pwsh (not powershell): Get-AspireBotInstallationToken.ps1 uses
              # RSA.ImportFromPem, which is only available in .NET Core 3.0+ / .NET 5+.
              # The legacy `powershell:` shorthand runs Windows PowerShell 5.1 on
              # .NET Framework, which doesn't have that API and would fail at runtime.
              - pwsh: |
                  $inputs = @{
                    release_version     = "$(ReleaseVersionEffective)"
                    commit_sha          = "$(CommitShaDerived)"
                    release_branch      = "$(ReleaseBranchDerived)"
                    is_prerelease       = ([System.Convert]::ToBoolean("${{ parameters.IsPrerelease }}")).ToString().ToLowerInvariant()
                    dry_run             = ([System.Convert]::ToBoolean("${{ parameters.DryRun }}")).ToString().ToLowerInvariant()
                    # The AzDO pipeline owns idempotency for the *AzDO* side via its
                    # own Skip* parameters. The GH workflow skip_* flags stay at
                    # their defaults (false). If a GH-side step needs to be
                    # skipped, the release manager can run the workflow manually
                    # after setting SkipGitHubTasks=true on the AzDO re-run.
                    skip_tagging        = "false"
                    skip_github_release = "false"
                    skip_merge_pr       = "false"
                    skip_baseline_pr    = "false"
                  }

                  & "$(Build.SourcesDirectory)/eng/pipelines/scripts/dispatch-release-github-tasks.ps1" `
                    -AppId         "$env:ASPIRE_BOT_APP_ID" `
                    -PrivateKeyPem "$env:ASPIRE_BOT_PRIVATE_KEY" `
                    -Owner         'microsoft' `
                    -Repo          'aspire' `
                    -WorkflowFile  'release-github-tasks.yml' `
                    -Ref           '${{ parameters.GitHubTasksWorkflowRef }}' `
                    -Inputs        $inputs
                displayName: 'Dispatch release-github-tasks and wait'
                env:
                  # Secrets must be mapped explicitly into env so PowerShell can
                  # read them; AzDO doesn't expose secret variables to scripts
                  # by default.
                  ASPIRE_BOT_APP_ID: $(aspire-bot-app-id)
                  ASPIRE_BOT_PRIVATE_KEY: $(aspire-bot-private-key)

              - powershell: |
                  Write-Host ""
                  Write-Host "Dispatched run: $env:DISPATCHED_RUN_URL"
                displayName: 'Print dispatched run URL'
                condition: always()
                env:
                  DISPATCHED_RUN_URL: $(DispatchedRunUrl)

          # Upload aspire-cli-* archives from the signed source build's
          # BlobArtifacts onto the GitHub release. Depends on the dispatch
          # job so the release exists before we try to attach assets to it.
          # When SkipGitHubTasks=true (re-run after the GH workflow already
          # ran), we still want to try the upload — dependsOn declares only
          # ordering, and the conditions above let this job run on its own
          # when its sibling is skipped.
          - job: PublishReleaseAssetsJob
            displayName: 'Upload CLI Assets to GitHub Release'
            dependsOn: DispatchGitHubTasksJob
            condition: |
              and(
                eq('${{ parameters.SkipReleaseAssets }}', 'false'),
                in(dependencies.DispatchGitHubTasksJob.result, 'Succeeded', 'SucceededWithIssues', 'Skipped')
              )
            timeoutInMinutes: 30
            pool:
              name: NetCore1ESPool-Internal
              image: windows.vs2026preview.scout.amd64
              os: windows
            variables:
              # Pulled from the deriveReleaseVersion step in PrepareJob (PrepareArtifacts stage).
              # Mapped here independently of DispatchGitHubTasksJob so this job still gets the
              # value when SkipGitHubTasks=true causes its sibling to be skipped.
              ReleaseVersionEffective: $[ stageDependencies.PrepareArtifacts.PrepareJob.outputs['deriveReleaseVersion.releaseVersionEffective'] ]
            steps:
              - checkout: self
                displayName: 'Checkout repo (for upload script)'
                fetchDepth: 1

              # Download aspire-cli-* archives from the source build. Matches
              # the existing PackageArtifacts/winget/homebrew download pattern.
              - download: aspire-build
                displayName: 'Download aspire-cli-* from Source Build'
                artifact: BlobArtifacts
                patterns: 'aspire-cli-*'

              # pwsh (not powershell): publish-release-cli-assets.ps1 calls
              # Get-AspireBotInstallationToken.ps1, which uses RSA.ImportFromPem
              # — only available in .NET Core 3.0+ / .NET 5+, not in the .NET
              # Framework runtime backing the legacy `powershell:` shorthand.
              - pwsh: |
                  $dryRun = [System.Convert]::ToBoolean("${{ parameters.DryRun }}")
                  $tag    = "v$(ReleaseVersionEffective)"

                  $assetsDir = Join-Path "$(Pipeline.Workspace)" 'aspire-build/BlobArtifacts'
                  Write-Host "Assets dir: $assetsDir"

                  # Use hashtable splatting (not array splatting) because the PEM
                  # private key value starts with `-----BEGIN PRIVATE KEY-----`.
                  # With `@arr` splat, PowerShell's parameter binder sees the value
                  # for -PrivateKeyPem also starting with `-` and tries to interpret
                  # it as another switch, failing with "A positional parameter cannot
                  # be found that accepts argument '-PrivateKeyPem'." Hashtable splat
                  # explicitly binds each value to its named parameter and bypasses
                  # the "looks like a switch" heuristic. See dispatch step above for
                  # the equivalent inline backtick form (also safe).
                  $scriptArgs = @{
                    AssetsDir     = $assetsDir
                    Tag           = $tag
                    AppId         = $env:ASPIRE_BOT_APP_ID
                    PrivateKeyPem = $env:ASPIRE_BOT_PRIVATE_KEY
                  }
                  if ($dryRun) { $scriptArgs.DryRun = $true }

                  & "$(Build.SourcesDirectory)/eng/pipelines/scripts/publish-release-cli-assets.ps1" @scriptArgs
                displayName: 'Verify SHA512s and upload to GitHub Release'
                env:
                  ASPIRE_BOT_APP_ID: $(aspire-bot-app-id)
                  ASPIRE_BOT_PRIVATE_KEY: $(aspire-bot-private-key)
