parameters:
  # values: windows/mac/linux
  agentOs: 'windows'
  targetRidsForSameOS:
    - linux-x64
  extraBuildArgs: ''
  codeSign: false
  teamName: ''

jobs:

- ${{ each targetRid in parameters.targetRidsForSameOS }}:
  - template: /eng/common/templates-official/jobs/jobs.yml@self
    parameters:
      enableMicrobuild: ${{ eq(parameters.codeSign, true) }}
      enableMicrobuildForMacAndLinux: ${{ and(eq(parameters.codeSign, true), ne(parameters.agentOs, 'windows')) }}
      enableTelemetry: true
      # Publish build logs
      enablePublishBuildArtifacts: true
      ${{ if eq(parameters.agentOs, 'linux') }}:
        container: ${{ replace(targetRid, '-', '_') }}

      jobs:
      - job: BuildNative_${{ replace(targetRid, '-', '_') }}
        displayName: ${{ replace(targetRid, '-', '_') }}
        timeoutInMinutes: 60

        variables:
        - TeamName: ${{ parameters.teamName }}
        - ${{ if eq(parameters.codeSign, true) }}:
          - _buildArgs: '-sign'
        - ${{ else }}:
          - _buildArgs: ''

        - ${{ if eq(parameters.agentOs, 'windows') }}:
          - scriptName: build.cmd
          - dotnetScript: dotnet.cmd
        - ${{ else }}:
          - scriptName: build.sh
          - dotnetScript: dotnet.sh
        # Map target RID architecture to Agent.OSArchitecture so the verify
        # step only runs when the binary can execute natively on the agent.
        - ${{ if contains(targetRid, 'arm64') }}:
          - name: _ridAgentArch
            value: ARM64
        - ${{ if contains(targetRid, 'x64') }}:
          - name: _ridAgentArch
            value: X64

        pool:
          ${{ if eq(parameters.agentOs, 'windows') }}:
            name: NetCore1ESPool-Internal
            image: windows.vs2026preview.scout.amd64
            os: windows
          ${{ if eq(parameters.agentOs, 'linux') }}:
            name: NetCore1ESPool-Internal
            image: build.azurelinux.3.amd64
            os: linux
          ${{ if eq(parameters.agentOs, 'macos') }}:
            name: Azure Pipelines
            vmImage: macOS-latest-internal
            os: macOS

        preSteps:
          - checkout: self
            fetchDepth: 1

          # Installing Microbuild plugin fails due to https://github.com/dotnet/arcade/issues/15946#issuecomment-3045780552
          # because of the preview sdk. To fix that `restore` from `global.json` so the above step
          # does not have to install anything.
          - script: $(Build.SourcesDirectory)/$(scriptName) -restore /p:Configuration=$(_BuildConfig)
            displayName: 🟣Restore

        steps:
          # Compute the Aspire CLI channel for the AspireCliChannel MSBuild
          # property consumed by the native CLI build below. This is the canonical
          # AzDO compute: build_sign_native runs BEFORE the `build` stage (per the
          # dependsOn graph), so an output variable from a later stage would not
          # be visible here, and there is no other AzDO consumer of this value.
          # The variable is job-scoped (no isOutput=true) since it is consumed by
          # a later step in the same job.
          - pwsh: |
              $ErrorActionPreference = 'Stop'
              $reason = '$(Build.Reason)'
              $sourceBranch = '$(Build.SourceBranch)'
              $prNumber = '$(System.PullRequest.PullRequestNumber)'
              Write-Host "Build.Reason: '$reason'"
              Write-Host "Build.SourceBranch: '$sourceBranch'"
              Write-Host "System.PullRequest.PullRequestNumber: '$prNumber'"

              $versionKind = & "$(Build.SourcesDirectory)/$(dotnetScript)" msbuild "$(Build.SourcesDirectory)/eng/Versions.props" -getProperty:DotNetFinalVersionKind
              $versionKind = $versionKind.Trim()
              Write-Host "DotNetFinalVersionKind: '$versionKind'"

              if ($reason -eq 'PullRequest') {
                # Defense in depth: validate digit-only PR number rather than just
                # non-emptiness. If the agent ever returns the literal macro string
                # (e.g. '$(System.PullRequest.PullRequestNumber)' unresolved) this
                # catches it at compute time rather than letting an invalid
                # AspireCliChannel value reach the build and be rejected later by
                # IdentityChannelReader.IsValidChannel — clearer failure attribution.
                if ($prNumber -notmatch '^\d+$') {
                  throw "Build.Reason is 'PullRequest' but System.PullRequest.PullRequestNumber was not a numeric PR number: '$prNumber'."
                }
                # Bake the resolved hive label directly into AspireCliChannel. The CLI
                # consumes this verbatim and avoids the legacy "pr" + parsed-PrNumber join.
                $channel = "pr-$prNumber"
              } elseif ($versionKind -eq 'release') {
                $channel = 'stable'
              } elseif ($sourceBranch -match '^refs/heads/(release|internal/release)/') {
                $channel = 'staging'
              } else {
                # main and any other branch fall through to daily
                $channel = 'daily'
              }

              Write-Host "Aspire CLI channel: $channel"
              Write-Host "##vso[task.setvariable variable=aspireCliChannel]$channel"
            name: computeCliChannel
            displayName: 🟣Determine Aspire CLI channel

          # Build, publish, and sign aspire-managed before creating the bundle layout.
          # This ensures aspire-managed is signed before CreateLayout packs it into the bundle archive.
          # Step 1: dotnet publish produces the self-contained single-file binary.
          # Step 2: build.sh -sign runs Arcade's signing (only when codeSign is enabled).
          # Step 3: Bundle.proj creates the bundle layout and archive using the signed binary.
          - script: >-
              $(Build.SourcesDirectory)/$(dotnetScript)
              publish
              $(Build.SourcesDirectory)/src/Aspire.Managed/Aspire.Managed.csproj
              -c $(_BuildConfig)
              -r ${{ targetRid }}
              --self-contained
              /p:GenerateDocumentationFile=false
              /p:EnforceCodeStyleInBuild=false
              ${{ parameters.extraBuildArgs }}
              /bl:$(Build.Arcade.LogsPath)PublishManaged.binlog
            displayName: 🟣Prepare aspire-managed

          # On macOS, ad-hoc codesign aspire-managed with JIT entitlements BEFORE Arcade signing.
          # MicroBuild (MacDeveloperHardenWithNotarization) preserves entitlements from the prior
          # ad-hoc signature when re-signing with the real certificate. Without this step,
          # hardened runtime blocks CoreCLR JIT (W^X memory mapping) causing HRESULT: 0x80070008.
          # This follows the same pattern used by dotnet/sdk for managed binaries (roslyn-entitlements.plist).
          - ${{ if eq(parameters.agentOs, 'macos') }}:
            - script: >-
                codesign --sign - --force
                --entitlements $(Build.SourcesDirectory)/eng/aspire-managed-entitlements.plist
                $(Build.SourcesDirectory)/artifacts/bin/Aspire.Managed/Release/net10.0/${{ targetRid }}/publish/aspire-managed
              displayName: 🟣Ad-hoc codesign aspire-managed with JIT entitlements

          - ${{ if eq(parameters.codeSign, true) }}:
            - script: >-
                $(Build.SourcesDirectory)/$(scriptName)
                -restore -sign
                ${{ parameters.extraBuildArgs }}
                -projects $(Build.SourcesDirectory)/src/Aspire.Managed/Aspire.Managed.csproj
                /bl:$(Build.Arcade.LogsPath)SignManaged.binlog
              displayName: 🟣Sign aspire-managed
              env:
                SYSTEM_ACCESSTOKEN: $(System.AccessToken)

          # On macOS/Linux, restore the execute bit after Arcade signing.
          # MicroBuild rewrites the binary file during signing, which resets permissions
          # to the default umask (typically 644). The execute bit must be restored before
          # CreateLayout packs the binary into the bundle archive.
          - ${{ if and(eq(parameters.codeSign, true), ne(parameters.agentOs, 'windows')) }}:
            - script: >-
                chmod +x $(Build.SourcesDirectory)/artifacts/bin/Aspire.Managed/Release/net10.0/${{ targetRid }}/publish/aspire-managed
              displayName: 🟣Restore execute permission on aspire-managed

          - task: NodeTool@0
            displayName: 🟣Install node.js
            inputs:
              versionSpec: '22.x'

          - script: >-
              $(Build.SourcesDirectory)/$(dotnetScript)
              msbuild
              $(Build.SourcesDirectory)/eng/Bundle.proj
              "/t:_RestoreDcpPackage;_RunCreateLayout"
              /p:Configuration=$(_BuildConfig)
              /p:TargetRid=${{ targetRid }}
              /p:BundleVersion=ci-bundlepayload
              /p:ContinuousIntegrationBuild=true
              /bl:$(Build.Arcade.LogsPath)BundleLayout.binlog
            displayName: 🟣Create bundle layout

          - script: >-
              $(Build.SourcesDirectory)/$(scriptName)
              -ci
              -build
              -pack
              -restore
              /p:SkipManagedBuild=true
              /p:TargetRids=${{ targetRid }}
              /p:BundlePayloadPath=$(Build.SourcesDirectory)/artifacts/bundle/aspire-ci-bundlepayload-${{ targetRid }}.tar.gz
              /p:AspireCliChannel=$(aspireCliChannel)
              $(_buildArgs)
              ${{ parameters.extraBuildArgs }}
              /bl:$(Build.Arcade.LogsPath)Build.binlog
            displayName: 🟣Build native packages
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken) # Needed for the signing task

          - pwsh: |
              $ErrorActionPreference = 'Stop'
              $verifyParams = @{
                PackagesDir = "$(Build.SourcesDirectory)/artifacts/packages/$(_BuildConfig)"
                Rid = "${{ targetRid }}"
              }
              $archiveFilter = if ("${{ targetRid }}".StartsWith('win-')) { "aspire-cli-${{ targetRid }}-*.zip" } else { "aspire-cli-${{ targetRid }}-*.tar.gz" }
              $archive = @(Get-ChildItem -Path $verifyParams.PackagesDir -Filter $archiveFilter -Recurse -File -ErrorAction SilentlyContinue)
              if ($archive.Count -ne 1) {
                throw "Expected exactly one CLI archive for ${{ targetRid }}, but found $($archive.Count): $($archive.FullName -join ', ')"
              }
              $verifyParams.ArchivePath = $archive[0].FullName
              & "$(Build.SourcesDirectory)/eng/scripts/verify-cli-tool-nupkg.ps1" @verifyParams
            displayName: 🟣Verify CLI tool nupkg (${{ targetRid }})

          - pwsh: |
              $ErrorActionPreference = 'Stop'
              $verifyParams = @{
                PackagesDir = "$(Build.SourcesDirectory)/artifacts/packages/$(_BuildConfig)"
                Rid = "${{ targetRid }}"
              }
              $archiveFilter = if ("${{ targetRid }}".StartsWith('win-')) { "aspire-cli-${{ targetRid }}-*.zip" } else { "aspire-cli-${{ targetRid }}-*.tar.gz" }
              $archive = @(Get-ChildItem -Path $verifyParams.PackagesDir -Filter $archiveFilter -Recurse -File -ErrorAction SilentlyContinue)
              if ($archive.Count -ne 1) {
                throw "Expected exactly one CLI archive for ${{ targetRid }}, but found $($archive.Count): $($archive.FullName -join ', ')"
              }
              $verifyParams.ArchivePath = $archive[0].FullName
              & "$(Build.SourcesDirectory)/eng/scripts/verify-cli-npm-package.ps1" @verifyParams
            displayName: 🟣Verify CLI npm package (${{ targetRid }})

          # Verify the signed CLI archive can execute and create a project.
          # Only runs when the target RID architecture matches the build agent
          # (i.e. the binary can execute natively without emulation).
          - ${{ if eq(parameters.agentOs, 'windows') }}:
            - pwsh: |
                $ErrorActionPreference = 'Stop'
                Write-Host "Finding CLI archive for ${{ targetRid }}..."
                $archiveDir = "$(Build.SourcesDirectory)/artifacts/packages/$(_BuildConfig)"
                $archive = Get-ChildItem -Path $archiveDir -Filter "aspire-cli-${{ targetRid }}-*.zip" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
                if (-not $archive) {
                  Write-Host "##[error]No CLI archive found for ${{ targetRid }}"
                  exit 1
                }
                Write-Host "Found archive: $($archive.FullName)"
                & "$(Build.SourcesDirectory)/eng/scripts/verify-cli-archive.ps1" -ArchivePath $archive.FullName
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "##[error]CLI archive verification failed"
                  exit 1
                }
              displayName: 🟣Verify CLI archive (${{ targetRid }})
              condition: and(succeeded(), eq(variables['Agent.OSArchitecture'], variables['_ridAgentArch']))
              env:
                ASPIRE_CLI_TELEMETRY_OPTOUT: 'true'
                DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

          - ${{ if and(ne(parameters.agentOs, 'windows'), not(contains(targetRid, 'musl'))) }}:
            - pwsh: |
                $ErrorActionPreference = 'Stop'
                Write-Host "Finding CLI archive for ${{ targetRid }}..."
                $archiveDir = "$(Build.SourcesDirectory)/artifacts/packages/$(_BuildConfig)"
                $archive = Get-ChildItem -Path $archiveDir -Filter "aspire-cli-${{ targetRid }}-*.tar.gz" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
                if (-not $archive) {
                  Write-Host "##[error]No CLI archive found for ${{ targetRid }}"
                  exit 1
                }
                Write-Host "Found archive: $($archive.FullName)"
                & "$(Build.SourcesDirectory)/eng/scripts/verify-cli-archive.ps1" -ArchivePath $archive.FullName
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "##[error]CLI archive verification failed"
                  exit 1
                }
              displayName: 🟣Verify CLI archive (${{ targetRid }})
              condition: and(succeeded(), eq(variables['Agent.OSArchitecture'], variables['_ridAgentArch']))
              env:
                ASPIRE_CLI_TELEMETRY_OPTOUT: 'true'
                DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

          - task: 1ES.PublishBuildArtifacts@1
            displayName: 🟣Publish Artifacts
            condition: always()
            inputs:
              PathtoPublish: '$(Build.Arcade.ArtifactsPath)packages/'
              ArtifactName: native_archives_${{ replace(targetRid, '-', '_') }}
