---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "env2-dashboard-deployment"
  labels:
    app.kubernetes.io/name: "aspire-hosting-tests"
    app.kubernetes.io/component: "env2-dashboard"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "aspire-hosting-tests"
        app.kubernetes.io/component: "env2-dashboard"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
          name: "env2-dashboard"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: 18888
            - name: "otlp-grpc"
              protocol: "TCP"
              containerPort: 18889
            - name: "otlp-http"
              protocol: "TCP"
              containerPort: 18890
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "aspire-hosting-tests"
      app.kubernetes.io/component: "env2-dashboard"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
