---
apiVersion: "apps/v1"
kind: "StatefulSet"
metadata:
  name: "api-statefulset"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "api"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Chart.Name }}"
        app.kubernetes.io/component: "api"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "{{ .Values.parameters.api.api_image }}"
          name: "api"
          envFrom:
            - configMapRef:
                name: "api-config"
          volumeMounts:
            - name: "media"
              mountPath: "/srv/media"
          imagePullPolicy: "IfNotPresent"
      volumes:
        - name: "media"
          persistentVolumeClaim:
            claimName: "media"
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Chart.Name }}"
      app.kubernetes.io/component: "api"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
