---
apiVersion: "v1"
kind: "PersistentVolumeClaim"
metadata:
  name: "service-data-pvc"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "service"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  storageClassName: "managed-csi"
  accessModes:
    - "ReadWriteOnce"
  resources:
    requests:
      storage: "10Gi"
