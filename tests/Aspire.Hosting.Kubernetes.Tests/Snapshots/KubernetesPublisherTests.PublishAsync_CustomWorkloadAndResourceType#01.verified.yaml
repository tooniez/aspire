    services__myapp__http__0: "http://myapp-service:8080"
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://env-dashboard-service:18889"
    OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
    OTEL_SERVICE_NAME: "project1"
