services:
  swarm-env-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  my-service:
    image: "my-image:latest"
    networks:
      - "aspire"
    deploy:
      update_config:
        parallelism: 2
        delay: "10s"
        failure_action: "rollback"
        monitor: "5s"
        max_failure_ratio: "0.3"
        order: "start-first"
networks:
  aspire:
    driver: "bridge"
