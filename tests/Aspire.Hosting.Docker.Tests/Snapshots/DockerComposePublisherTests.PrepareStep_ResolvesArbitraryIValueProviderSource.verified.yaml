services:
  docker-compose-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  testapp:
    image: "testimage:latest"
    environment:
      MY_VAR: "${TEST_CONDITION}"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
